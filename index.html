<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspector Vault V24</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --danger: #ff3b30; --success: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 100px; }
        .hidden { display: none !important; }

        .status-bar { background: #1c1c1e; color: #34c759; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .project-row { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom:10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; font-weight: 600; }
        
        textarea { width: 100%; min-height: 200px; max-height: 50vh; border-radius: 15px; border: 1px solid #d1d1d6; padding: 15px; font-size: 17px; margin-bottom: 10px; outline: none; resize: none; }
        #img-preview { width: 100%; border-radius: 12px; margin-bottom: 10px; display: none; border: 2px solid var(--primary); }

        .btn-dictate { width: 100%; padding: 20px; border-radius: 15px; border: none; background: var(--danger); color: white; font-size: 18px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-dictate.active { background: #ff9500; animation: pulse 1.5s infinite; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-sec { background: #5856d6; color: white; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; text-align: center;}
        .btn-primary { background: var(--primary); color: white; padding: 18px; border-radius: 15px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        
        .entry { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 15px; border-left: 5px solid var(--primary); }
        .entry img { width: 100%; border-radius: 8px; margin-top: 10px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="home-view">
    <div class="status-bar">
        <span>📂 STATELESS SYNC MODE</span>
        <button onclick="document.getElementById('load-json').click()" style="background:#34c759; color:white; border:none; padding:5px 10px; border-radius:5px; font-weight:bold;">LOAD PROJECT FILE</button>
        <input type="file" id="load-json" class="hidden" accept=".json" onchange="importJSON(this)">
    </div>
    
    <div id="p-list"></div>
    
    <div style="margin-top:25px; text-align: center;">
        <input type="text" id="new-p" placeholder="New Project Name..." style="padding:15px; border-radius:12px; border:1px solid #ccc; width:55%; font-size:16px;">
        <button onclick="addP()" class="btn-primary" style="width:auto; padding:15px 25px;">+</button>
    </div>
</div>

<div id="editor-view" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <button onclick="goHome()" style="background:none; border:none; color:var(--primary); font-weight:bold; font-size: 17px;">← Hub</button>
        <strong id="active-title">Project</strong>
        <button onclick="exportBundle()" style="background:var(--success); color:white; border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">📦 SYNC & EXPORT</button>
    </div>

    <img id="img-preview" src="">
    <textarea id="note-box" placeholder="Dictate or type..."></textarea>
    
    <button class="btn-dictate" id="mic-btn" onclick="toggleMic()">🎤 Start Dictation</button>
    
    <div class="action-grid">
        <button onclick="document.getElementById('cam-input').click()" class="btn-sec">📸 Add Photo</button>
        <input type="file" id="cam-input" accept="image/*" capture="environment" class="hidden" onchange="previewImg(this)">
        <button onclick="saveEntry()" class="btn-primary">💾 Save to Session</button>
    </div>

    <div id="log-list"></div>
</div>

<script>
    let sessionData = []; let activeP = ""; let currentBase64 = "";
    
    // UI Logic
    function addP() {
        const n = document.getElementById('new-p').value.trim();
        if(n) { activeP = n; document.getElementById('new-p').value = ''; openP(n); }
    }

    function openP(p) {
        activeP = p;
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('editor-view').classList.remove('hidden');
        document.getElementById('active-title').textContent = p;
        renderLogs();
    }

    function goHome() {
        document.getElementById('home-view').classList.remove('hidden');
        document.getElementById('editor-view').classList.add('hidden');
    }

    // Photo Handling
    function previewImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 800;
                    const scale = maxW / img.width;
                    canvas.width = maxW; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('img-preview').src = currentBase64;
                    document.getElementById('img-preview').style.display = 'block';
                }
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Session Management
    function saveEntry() {
        const t = document.getElementById('note-box').value.trim();
        if(!t && !currentBase64) return;
        const entry = { p: activeP, t: t, img: currentBase64, d: new Date().toLocaleString() };
        sessionData.push(entry);
        document.getElementById('note-box').value = '';
        document.getElementById('img-preview').style.display = 'none';
        currentBase64 = "";
        renderLogs();
    }

    function renderLogs() {
        const list = document.getElementById('log-list');
        list.innerHTML = '';
        sessionData.filter(l => l.p === activeP).reverse().forEach(l => {
            list.innerHTML += `<div class="entry">
                <span style="font-size:10px; color:#999">${l.d}</span>
                <p style="white-space: pre-wrap;">${l.t}</p>
                ${l.img ? `<img src="${l.img}">` : ''}
            </div>`;
        });
    }

    // EXPORT LOGIC: DUAL MODE
    function exportBundle() {
        if (sessionData.length === 0) return alert("No data to export!");

        // 1. Export JSON (Master File)
        const jsonStr = JSON.stringify(sessionData, null, 2);
        downloadFile(jsonStr, `${activeP}_Bundle.json`, 'application/json');

        // 2. Export CSV (Excel Mode)
        let csv = "Date,Project,Note,HasMedia\n";
        sessionData.forEach(l => {
            csv += `${l.d},${l.p},"${l.t.replace(/"/g, '""')}","${l.img ? 'YES' : 'NO'}"\n`;
        });
        downloadFile(csv, `${activeP}_Audit.csv`, 'text/csv');
        
        alert("Dual Bundle Exported! Save these to your Project Folder.");
    }

    function downloadFile(content, fileName, contentType) {
        const a = document.createElement("a");
        const file = new Blob([content], {type: contentType});
        a.href = URL.createObjectURL(file);
        a.download = fileName;
        a.click();
    }

    // IMPORT LOGIC: Re-load old data
    function importJSON(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    sessionData = imported;
                    activeP = imported[0].p;
                    openP(activeP);
                } catch (err) {
                    alert("Invalid Project File.");
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Voice Logic (Caret-Aware)
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = SpeechRec ? new SpeechRec() : null;
    let isListening = false;
    if (recognition) {
        recognition.continuous = true;
        recognition.onresult = (e) => {
            let final = '';
            for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) final += e.results[i][0].transcript; }
            if (final) {
                const box = document.getElementById('note-box');
                const start = box.selectionStart;
                box.value = box.value.substring(0, start) + final + " " + box.value.substring(box.selectionEnd);
                box.setSelectionRange(start + final.length + 1, start + final.length + 1);
            }
        };
        recognition.onend = () => { if (isListening) recognition.start(); else updateBtn(); };
    }
    function toggleMic() {
        if (isListening) { isListening = false; recognition.stop(); }
        else { isListening = true; recognition.start(); }
        updateBtn();
    }
    function updateBtn() {
        const btn = document.getElementById('mic-btn');
        btn.textContent = isListening ? "🛑 Stop Listening..." : "🎤 Start Dictation";
        btn.className = isListening ? "btn-dictate active" : "btn-dictate";
    }
</script>
</body>
</html>
